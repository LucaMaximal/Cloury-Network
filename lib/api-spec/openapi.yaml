openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Cloury Network API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: server
  - name: news
  - name: events
  - name: leaderboard
  - name: players
  - name: auth
  - name: profile
  - name: tickets
  - name: dashboard
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /server/status:
    get:
      operationId: getServerStatus
      tags: [server]
      responses:
        "200":
          description: Server status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerStatus"

  /stats/summary:
    get:
      operationId: getNetworkStats
      tags: [server]
      responses:
        "200":
          description: Network stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NetworkStats"

  /news:
    get:
      operationId: listNews
      tags: [news]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of news
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NewsArticle"
    post:
      operationId: createNews
      tags: [news]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewsInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsArticle"

  /news/{id}:
    get:
      operationId: getNews
      tags: [news]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: News article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsArticle"
        "404":
          description: Not found

  /events:
    get:
      operationId: listEvents
      tags: [events]
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NetworkEvent"
    post:
      operationId: createEvent
      tags: [events]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NetworkEvent"

  /leaderboard:
    get:
      operationId: getLeaderboard
      tags: [leaderboard]
      parameters:
        - name: category
          in: query
          schema:
            type: string
            enum: [kills, coins, playtime]
            default: kills
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Leaderboard
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"

  /players/{username}:
    get:
      operationId: getPlayer
      tags: [players]
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Player profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerProfile"
        "404":
          description: Not found

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "409":
          description: Already exists

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated

  /profile/me:
    get:
      operationId: getMyProfile
      tags: [profile]
      responses:
        "200":
          description: Own profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerProfile"
        "401":
          description: Not authenticated
    patch:
      operationId: updateProfile
      tags: [profile]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"

  /profile/password:
    patch:
      operationId: changePassword
      tags: [profile]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordInput"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          description: Wrong password

  /profile/tickets:
    get:
      operationId: getMyTickets
      tags: [profile]
      responses:
        "200":
          description: My tickets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ticket"

  /tickets:
    get:
      operationId: listAllTickets
      tags: [tickets]
      responses:
        "200":
          description: All tickets (team only)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TicketWithUser"
    post:
      operationId: createTicket
      tags: [tickets]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTicketInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"

  /tickets/{id}:
    get:
      operationId: getTicket
      tags: [tickets]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ticket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"
        "404":
          description: Not found

  /tickets/{id}/status:
    patch:
      operationId: updateTicketStatus
      tags: [tickets]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTicketStatusInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/users:
    get:
      operationId: listDashboardUsers
      tags: [dashboard]
      responses:
        "200":
          description: All users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DashboardUser"

  /dashboard/users/{id}/role:
    patch:
      operationId: updateUserRole
      tags: [dashboard]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRoleInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardUser"

  /dashboard/news/{id}:
    delete:
      operationId: deleteDashboardNews
      tags: [dashboard]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /dashboard/events/{id}:
    delete:
      operationId: deleteDashboardEvent
      tags: [dashboard]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    OkResponse:
      type: object
      properties:
        ok:
          type: boolean
      required: [ok]

    ServerStatus:
      type: object
      properties:
        online:
          type: boolean
        playerCount:
          type: integer
        maxPlayers:
          type: integer
        version:
          type: string
        ping:
          type: integer
        motd:
          type: string
      required: [online, playerCount, maxPlayers, version, ping, motd]

    NetworkStats:
      type: object
      properties:
        totalPlayers:
          type: integer
        onlineNow:
          type: integer
        totalKills:
          type: integer
        totalPlaytime:
          type: integer
        newsCount:
          type: integer
        eventsCount:
          type: integer
      required: [totalPlayers, onlineNow, totalKills, totalPlaytime, newsCount, eventsCount]

    NewsArticle:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: string
        excerpt:
          type: string
        category:
          type: string
        author:
          type: string
        createdAt:
          type: string
          format: date-time
        imageUrl:
          type: ["string", "null"]
      required: [id, title, content, excerpt, category, author, createdAt]

    NewsInput:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        content:
          type: string
          minLength: 1
        excerpt:
          type: string
        category:
          type: string
        author:
          type: string
        imageUrl:
          type: string
      required: [title, content, excerpt, category, author]

    NetworkEvent:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        date:
          type: string
          format: date-time
        type:
          type: string
        prize:
          type: ["string", "null"]
        active:
          type: boolean
      required: [id, title, description, date, type, active]

    EventInput:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        date:
          type: string
          format: date-time
        type:
          type: string
        prize:
          type: string
      required: [title, description, date, type]

    LeaderboardEntry:
      type: object
      properties:
        rank:
          type: integer
        username:
          type: string
        uuid:
          type: string
        value:
          type: integer
        category:
          type: string
      required: [rank, username, uuid, value, category]

    Achievement:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        icon:
          type: string
      required: [id, name, description, icon]

    PlayerProfile:
      type: object
      properties:
        username:
          type: string
        uuid:
          type: ["string", "null"]
        role:
          type: string
        bio:
          type: ["string", "null"]
        playtime:
          type: integer
        kills:
          type: integer
        deaths:
          type: integer
        coins:
          type: integer
        createdAt:
          type: string
          format: date-time
        achievements:
          type: array
          items:
            $ref: "#/components/schemas/Achievement"
      required: [username, role, playtime, kills, deaths, coins, createdAt, achievements]

    AuthUser:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        username:
          type: string
        role:
          type: string
        bio:
          type: ["string", "null"]
        minecraftUsername:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required: [id, email, username, role]

    RegisterInput:
      type: object
      properties:
        email:
          type: string
          format: email
        username:
          type: string
          minLength: 3
        password:
          type: string
          minLength: 8
      required: [email, username, password]

    LoginInput:
      type: object
      properties:
        login:
          type: string
        password:
          type: string
      required: [login, password]

    UpdateProfileInput:
      type: object
      properties:
        bio:
          type: string
        minecraftUsername:
          type: string

    ChangePasswordInput:
      type: object
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
          minLength: 8
      required: [currentPassword, newPassword]

    Ticket:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        type:
          type: string
        title:
          type: string
        content:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, userId, type, title, content, status, createdAt, updatedAt]

    TicketWithUser:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        type:
          type: string
        title:
          type: string
        content:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        username:
          type: ["string", "null"]
      required: [id, userId, type, title, content, status, createdAt, updatedAt]

    CreateTicketInput:
      type: object
      properties:
        type:
          type: string
          enum: [Support, Bug, Report]
        title:
          type: string
          minLength: 1
        content:
          type: string
          minLength: 1
      required: [type, title, content]

    UpdateTicketStatusInput:
      type: object
      properties:
        status:
          type: string
          enum: [open, in_progress, resolved, closed]
      required: [status]

    DashboardStats:
      type: object
      properties:
        totalUsers:
          type: integer
        totalTickets:
          type: integer
        openTickets:
          type: integer
        totalNews:
          type: integer
        totalEvents:
          type: integer
        totalPlayers:
          type: integer
        onlineNow:
          type: integer
      required: [totalUsers, totalTickets, openTickets, totalNews, totalEvents, totalPlayers, onlineNow]

    DashboardUser:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        username:
          type: string
        role:
          type: string
        minecraftUsername:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required: [id, email, username, role, createdAt]

    UpdateRoleInput:
      type: object
      properties:
        role:
          type: string
      required: [role]
